<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grrr - Silence Your Hunger</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#ff471a" />
    <meta name="description" content="Grrr - Silence Your Hunger. Premium, intelligent food delivery." />
    <script>
      // Prevent theme flash: apply saved theme before first paint
      (function(){
        var t = localStorage.getItem('grrr_theme') || 'system';
        var r = t === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : t;
        document.documentElement.setAttribute('data-theme', r);
      })();
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
